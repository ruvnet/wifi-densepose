<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WiFi DensePose - 3D Visualization</title>
  <style>
    :root {
      --app-bg: #050510;
      --app-fg: #88bbdd;
      --overlay-bg: #050510;
      --title-color: #aaddff;
      --track-bg: #112233;
      --status-color: #446688;
    }

    body.light-theme {
      --app-bg: #eef4ff;
      --app-fg: #2b4f74;
      --overlay-bg: #eef4ff;
      --title-color: #2c5d8f;
      --track-bg: #c6d7eb;
      --status-color: #5a7da1;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--app-bg);
      font-family: 'Courier New', 'Consolas', monospace;
      color: var(--app-fg);
    }
    #viz-container {
      width: 100%;
      height: 100%;
      position: relative;
    }
    #loading-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--overlay-bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      transition: opacity 0.6s ease;
    }
    #loading-overlay.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .loading-title {
      font-size: 22px;
      color: var(--title-color);
      margin-bottom: 16px;
      letter-spacing: 4px;
      text-transform: uppercase;
    }
    .loading-bar-track {
      width: 280px;
      height: 3px;
      background: var(--track-bg);
      border-radius: 2px;
      overflow: hidden;
      margin-bottom: 12px;
    }
    .loading-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #0066ff, #00ccff);
      border-radius: 2px;
      transition: width 0.3s ease;
    }
    .loading-status {
      font-size: 11px;
      color: var(--status-color);
    }

    /* Brighten only the rendered canvas in light mode; HUD remains readable */
    canvas.theme-light {
      filter: brightness(1.55) saturate(0.85) contrast(0.92);
    }

    /* Stats.js panel positioning */
    #stats-container {
      position: absolute;
      top: 40px;
      right: 140px;
      z-index: 200;
    }

    #theme-toggle {
      position: absolute;
      top: 40px;
      right: 12px;
      z-index: 220;
      padding: 6px 10px;
      border: 1px solid #35567a;
      border-radius: 6px;
      background: rgba(10, 20, 35, 0.75);
      color: #b9d8f3;
      font-size: 11px;
      letter-spacing: 0.5px;
      cursor: pointer;
      user-select: none;
    }

    body.light-theme #theme-toggle {
      border-color: #6f95bb;
      background: rgba(240, 247, 255, 0.9);
      color: #244a70;
    }
  </style>
</head>
<body>
  <div id="viz-container">
    <!-- Loading overlay -->
    <div id="loading-overlay">
      <div class="loading-title">WiFi DensePose</div>
      <div class="loading-bar-track">
        <div class="loading-bar-fill" id="loading-fill"></div>
      </div>
      <div class="loading-status" id="loading-status">Initializing...</div>
    </div>
    <!-- Stats.js container -->
    <div id="stats-container"></div>
    <button id="theme-toggle" title="Toggle light/dark (L)">Theme: Dark</button>
  </div>

  <!-- Three.js (global build) + OrbitControls -->
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

  <!-- Stats.js for performance monitoring -->
  <script src="https://unpkg.com/stats.js@0.17.0/build/stats.min.js"></script>

  <!-- Application modules loaded as ES modules -->
  <script type="module">
    import { Scene } from './components/scene.js';
    import { BodyModel, BodyModelManager } from './components/body-model.js';
    import { SignalVisualization } from './components/signal-viz.js';
    import { Environment } from './components/environment.js';
    import { DashboardHUD } from './components/dashboard-hud.js';
    import { WebSocketClient } from './services/websocket-client.js';
    import { DataProcessor } from './services/data-processor.js';

    // -- Application State --
    const state = {
      scene: null,
      environment: null,
      bodyModelManager: null,
      signalViz: null,
      hud: null,
      wsClient: null,
      dataProcessor: null,
      stats: null,
      theme: 'dark',
      startTime: Date.now()
    };

    function resolveInitialTheme() {
      const params = new URLSearchParams(window.location.search);
      const fromQuery = params.get('theme');
      if (fromQuery === 'light' || fromQuery === 'dark') {
        return fromQuery;
      }

      const saved = localStorage.getItem('viz-theme');
      if (saved === 'light' || saved === 'dark') {
        return saved;
      }

      return 'dark';
    }

    function applyTheme(theme) {
      const nextTheme = theme === 'light' ? 'light' : 'dark';
      state.theme = nextTheme;
      const isLight = nextTheme === 'light';

      document.body.classList.toggle('light-theme', isLight);
      localStorage.setItem('viz-theme', nextTheme);

      if (state.scene) {
        const sceneObj = state.scene.getScene();
        const renderer = state.scene.getRenderer();
        const bgColor = isLight ? 0xeef4ff : 0x0a0a1a;
        const fogDensity = isLight ? 0.004 : 0.008;
        const exposure = isLight ? 1.6 : 1.0;

        if (sceneObj) {
          sceneObj.background = new window.THREE.Color(bgColor);
          sceneObj.fog = new window.THREE.FogExp2(bgColor, fogDensity);
        }

        if (renderer) {
          renderer.toneMappingExposure = exposure;
          renderer.setClearColor(bgColor, 1.0);
          renderer.domElement.classList.toggle('theme-light', isLight);
        }
      }

      const themeBtn = document.getElementById('theme-toggle');
      if (themeBtn) {
        themeBtn.textContent = `Theme: ${isLight ? 'Light' : 'Dark'}`;
      }

      console.log(`[VIZ] Theme: ${nextTheme}`);
    }

    // -- Loading Progress --
    function setLoadingProgress(pct, msg) {
      const fill = document.getElementById('loading-fill');
      const status = document.getElementById('loading-status');
      if (fill) fill.style.width = pct + '%';
      if (status) status.textContent = msg;
    }

    function showFatalError(error) {
      const msg = error?.message || String(error || 'Unknown error');
      setLoadingProgress(100, `Error: ${msg}`);
      console.error('[VIZ] Fatal error:', error);
    }

    window.addEventListener('error', (event) => {
      if (event?.error) showFatalError(event.error);
    });

    window.addEventListener('unhandledrejection', (event) => {
      showFatalError(event?.reason || new Error('Unhandled promise rejection'));
    });

    function hideLoading() {
      const overlay = document.getElementById('loading-overlay');
      if (overlay) overlay.classList.add('hidden');
      setTimeout(() => {
        if (overlay && overlay.parentNode) overlay.parentNode.removeChild(overlay);
      }, 700);
    }

    // -- Initialize Stats.js --
    function initStats() {
      const stats = new Stats();
      stats.showPanel(0); // FPS panel
      stats.dom.style.position = 'relative';
      document.getElementById('stats-container').appendChild(stats.dom);
      return stats;
    }

    // -- Main Initialization --
    async function init() {
      const container = document.getElementById('viz-container');
      state.theme = resolveInitialTheme();
      applyTheme(state.theme);

      try {
        setLoadingProgress(10, 'Creating 3D scene...');

        // 1. Scene setup
        state.scene = new Scene(container);
        applyTheme(state.theme);
        setLoadingProgress(25, 'Building environment...');

        // 2. Environment (room, grid, APs, zones)
        state.environment = new Environment(state.scene.getScene());
        setLoadingProgress(40, 'Preparing body models...');

        // 3. Body model manager
        state.bodyModelManager = new BodyModelManager(state.scene.getScene());
        setLoadingProgress(55, 'Setting up signal visualization...');

        // 4. Signal visualization
        state.signalViz = new SignalVisualization(state.scene.getScene());
        setLoadingProgress(65, 'Creating HUD...');

        // 5. Dashboard HUD
        state.hud = new DashboardHUD(container);
        setLoadingProgress(75, 'Initializing data processor...');

        // 6. Data processor
        state.dataProcessor = new DataProcessor();
        setLoadingProgress(80, 'Setting up Stats.js...');

        // 7. Stats.js
        state.stats = initStats();
        setLoadingProgress(85, 'Connecting to server...');

        // 8. WebSocket client
        state.wsClient = new WebSocketClient({
          url: 'ws://localhost:8000/api/v1/stream/pose?token=dev-observatory',
          onMessage: (msg) => handleWebSocketMessage(msg),
          onStateChange: (newState, oldState) => handleConnectionStateChange(newState, oldState),
          onError: (err) => console.error('[VIZ] WebSocket error:', err)
        });

        // Attempt connection (real-only mode: no demo fallback)
        state.wsClient.connect();
        setLoadingProgress(95, 'Starting render loop...');

        // 9. Register the main update loop
        state.scene.onUpdate((delta, elapsed) => {
          mainUpdate(delta, elapsed);
        });

        // Start rendering
        state.scene.start();
        setLoadingProgress(100, 'Ready');

        // Hide loading after a brief moment
        setTimeout(hideLoading, 400);

        console.log('[VIZ] Initialization complete');

      } catch (err) {
        console.error('[VIZ] Initialization failed:', err);
        setLoadingProgress(100, 'Error: ' + err.message);
      }
    }

    // -- Main Update Loop (called every frame) --
    function mainUpdate(delta, elapsed) {
      // Stats.js begin
      if (state.stats) state.stats.begin();

      // Real-only mode: visual updates are driven only by incoming stream frames.
      const vizData = null;

      // If we have viz data (from demo or last processed real data), update visualizations
      if (vizData) {
        // Update body models
        state.bodyModelManager.update(vizData.persons, delta);

        // Update zone occupancy
        state.environment.updateZoneOccupancy(vizData.zoneOccupancy);

        // Update confidence heatmap
        const heatmap = state.dataProcessor.generateConfidenceHeatmap(
          vizData.persons, 20, 15, 8, 6
        );
        state.environment.updateConfidenceHeatmap(heatmap);
      }

      // Update environment animations (AP pulse, signal paths)
      state.environment.update(delta, elapsed);

      // Update signal visualization animations
      state.signalViz.update(delta, elapsed);

      // Update HUD
      if (state.hud) {
        state.hud.tickFPS();

        const wsMetrics = state.wsClient.getMetrics();
        state.hud.updateState({
          connectionStatus: state.wsClient.state,
          isRealData: state.wsClient.isRealData,
          latency: wsMetrics.latency,
          messageCount: wsMetrics.messageCount,
          uptime: wsMetrics.uptime,
          personCount: state.bodyModelManager.getActiveCount(),
          confidence: state.bodyModelManager.getAverageConfidence(),
          sensingMode: state.wsClient.isRealData ? 'CSI' : 'OFFLINE'
        });
      }

      // Stats.js end
      if (state.stats) state.stats.end();
    }

    // -- Handle incoming WebSocket messages --
    function handleWebSocketMessage(message) {
      const processed = state.dataProcessor.processMessage(message);
      if (!processed) return;
      if (processed.metadata && processed.metadata.isRealData === false) {
        console.warn('[VIZ] Non-real frame rejected');
        return;
      }

      if (processed.persons.length > 0) {
        console.log('[VIZ] Live data frame received');

        // Update body models
        state.bodyModelManager.update(processed.persons, 0.016);

        // Update zone occupancy
        state.environment.updateZoneOccupancy(processed.zoneOccupancy);

        // Update signal data if available
        if (processed.signalData) {
          state.signalViz.updateSignalData(processed.signalData);
        }

        // Update confidence heatmap
        const heatmap = state.dataProcessor.generateConfidenceHeatmap(
          processed.persons, 20, 15, 8, 6
        );
        state.environment.updateConfidenceHeatmap(heatmap);
      }
    }

    // -- Handle WebSocket connection state changes --
    function handleConnectionStateChange(newState, oldState) {
      console.log(`[VIZ] Connection: ${oldState} -> ${newState}`);

      if (newState === 'connected') {
        console.log('[VIZ] Connected to server, waiting for data...');
      } else if (newState === 'error' || newState === 'disconnected') {
        console.log('[VIZ] Server unavailable; no synthetic fallback in real-only mode');
        if (state.bodyModelManager) {
          state.bodyModelManager.update([], 0.016);
        }
        if (state.environment) {
          state.environment.updateZoneOccupancy({});
          state.environment.updateConfidenceHeatmap(new Float32Array(20 * 15));
        }
      }
    }

    // -- Cleanup on page unload --
    window.addEventListener('beforeunload', () => {
      if (state.wsClient) state.wsClient.dispose();
      if (state.bodyModelManager) state.bodyModelManager.dispose();
      if (state.signalViz) state.signalViz.dispose();
      if (state.environment) state.environment.dispose();
      if (state.hud) state.hud.dispose();
      if (state.scene) state.scene.dispose();
    });

    // -- Keyboard shortcuts --
    document.addEventListener('keydown', (e) => {
      switch (e.key.toLowerCase()) {
        case 'r':
          // Reset camera
          if (state.scene) state.scene.resetCamera();
          break;
        case 'd':
          // Disabled in real-only mode
          break;
        case 'c':
          // Force reconnect
          if (state.wsClient) {
            state.wsClient.disconnect();
            state.wsClient.autoReconnect = true;
            state.wsClient.reconnectAttempts = 0;
            state.wsClient.connect();
          }
          break;
        case 'l':
          // Toggle light/dark theme
          applyTheme(state.theme === 'light' ? 'dark' : 'light');
          break;
      }
    });

    const themeBtn = document.getElementById('theme-toggle');
    if (themeBtn) {
      themeBtn.addEventListener('click', () => {
        applyTheme(state.theme === 'light' ? 'dark' : 'light');
      });
    }

    // -- Start --
    init();
  </script>
</body>
</html>
